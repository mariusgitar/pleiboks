<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotify Premium Debug</title>
  <style>
    body { font-family: system-ui; padding: 20px; background: #111; color: #fff; max-width: 480px; margin: 0 auto; }
    button { display: block; width: 100%; padding: 16px; background: #1DB954; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; margin: 8px 0; }
    button.sec { background: #333; font-size: 14px; padding: 12px; }
    .box { background: #1a1a2e; border-radius: 10px; padding: 14px; margin: 10px 0; font-size: 13px; line-height: 1.8; word-break: break-all; }
    .log { background: #0a0a0a; border-radius: 8px; padding: 10px; font-size: 11px; font-family: monospace; max-height: 400px; overflow-y: auto; margin-top: 12px; }
    .ok { color: #1DB954; } .err { color: #FF6B6B; } .inf { color: #aaa; } .warn { color: #FFD93D; }
  </style>
</head>
<body>
  <h2>🔍 Premium Debug</h2>
  <p style="opacity:0.6;font-size:13px">Sjekker token, scopes og Premium-status steg for steg</p>

  <div class="box" id="result">Trykk "Start diagnose" for å begynne</div>

  <button id="btn-run">🔎 Start full diagnose</button>
  <button id="btn-login" class="sec">↩ Logg inn på nytt (tving ny token)</button>
  <button id="btn-raw" class="sec" disabled>📋 Vis rå /api/me respons</button>
  <button id="btn-spotify-me" class="sec" disabled>📋 Vis rå Spotify /v1/me respons</button>

  <div class="log" id="log"></div>

  <script>
    let token = null;

    function log(msg, t = "inf") {
      const el = document.getElementById("log");
      const d = document.createElement("div");
      d.className = t;
      d.textContent = new Date().toLocaleTimeString("no") + " " + msg;
      el.prepend(d);
    }

    function result(html) {
      document.getElementById("result").innerHTML = html;
    }

    document.getElementById("btn-login").addEventListener("click", () => {
      window.location.href = "/api/login";
    });

    document.getElementById("btn-run").addEventListener("click", async () => {
      log("=== START DIAGNOSE ===", "warn");
      result("Kjører...");

      // STEG 1: Hent fra /api/me og vis ALT
      log("Steg 1: Henter /api/me...");
      let meData = null;
      try {
        const res = await fetch("/api/me");
        const raw = await res.text();
        log("/api/me HTTP status: " + res.status, res.ok ? "ok" : "err");
        log("/api/me rå respons: " + raw.substring(0, 300), "inf");
        meData = JSON.parse(raw);
        document.getElementById("btn-raw").disabled = false;
        document.getElementById("btn-raw").onclick = () => alert(JSON.stringify(meData, null, 2));
      } catch(e) {
        log("/api/me feil: " + e.message, "err");
        result("❌ /api/me feilet: " + e.message);
        return;
      }

      if (!meData?.accessToken) {
        log("Ingen accessToken i /api/me respons!", "err");
        log("Nøkler i respons: " + Object.keys(meData || {}).join(", "), "warn");
        result("❌ Ikke innlogget — mangler accessToken.<br>Trykk 'Logg inn på nytt'.");
        return;
      }

      token = meData.accessToken;
      log("Token hentet: " + token.substring(0, 20) + "...", "ok");
      log("loggedIn-felt: " + meData.loggedIn, meData.loggedIn ? "ok" : "warn");

      // STEG 2: Sjekk token mot Spotify /v1/me direkte
      log("Steg 2: Sjekker token mot Spotify API direkte...");
      let spotifyMe = null;
      try {
        const res = await fetch("https://api.spotify.com/v1/me", {
          headers: { Authorization: "Bearer " + token }
        });
        const raw = await res.text();
        log("Spotify /v1/me HTTP status: " + res.status, res.ok ? "ok" : "err");
        spotifyMe = JSON.parse(raw);
        document.getElementById("btn-spotify-me").disabled = false;
        document.getElementById("btn-spotify-me").onclick = () => alert(JSON.stringify(spotifyMe, null, 2));

        if (!res.ok) {
          log("Spotify API feil: " + spotifyMe?.error?.message, "err");
          if (res.status === 401) {
            log("→ Token er ugyldig eller utløpt!", "err");
            result("❌ Token er ugyldig (401).<br>Logg inn på nytt.");
            return;
          }
        }
      } catch(e) {
        log("Spotify API feil: " + e.message, "err");
        result("❌ Klarte ikke nå Spotify API");
        return;
      }

      // STEG 3: Analyser Premium-status
      log("Steg 3: Analyserer konto...");
      const product = spotifyMe?.product;
      const displayName = spotifyMe?.display_name || spotifyMe?.id;
      const country = spotifyMe?.country;
      const email = spotifyMe?.email;

      log("Brukernavn: " + displayName, "ok");
      log("E-post: " + (email || "ikke tilgjengelig"), "inf");
      log("Land: " + country, "inf");
      log("product-felt: '" + product + "'", product === "premium" ? "ok" : "err");

      // STEG 4: Sjekk token scopes
      log("Steg 4: Sjekker token scopes...");
      // Vi kan ikke se scopes direkte, men vi kan sjekke om streaming-scope virker
      // ved å prøve å nå /v1/me/player
      try {
        const playerRes = await fetch("https://api.spotify.com/v1/me/player", {
          headers: { Authorization: "Bearer " + token }
        });
        log("GET /v1/me/player: " + playerRes.status, "inf");
        if (playerRes.status === 403) {
          log("→ 403 på /v1/me/player = mangler 'user-read-playback-state' scope", "warn");
        } else if (playerRes.status === 204) {
          log("→ 204 = ingen aktiv enhet, men scope OK", "ok");
        } else if (playerRes.status === 200) {
          const playerData = await playerRes.json();
          log("→ Aktiv enhet: " + (playerData?.device?.name || "ukjent"), "ok");
        }
      } catch(e) {
        log("Player-sjekk feil: " + e.message, "warn");
      }

      // SAMMENDRAG
      const isPremium = product === "premium";
      const summary = `
        <b>Bruker:</b> ${displayName}<br>
        <b>E-post:</b> ${email || "–"}<br>
        <b>Land:</b> ${country || "–"}<br>
        <b>product:</b> <span style="color:${isPremium ? '#1DB954' : '#FF6B6B'}">${product || "ukjent"}</span><br>
        <b>Premium:</b> <span style="color:${isPremium ? '#1DB954' : '#FF6B6B'}">${isPremium ? "✅ Ja" : "❌ Nei — Web Playback SDK krever Premium"}</span><br>
        <br>
        ${!isPremium ? `<b>Mulige årsaker:</b><br>
        • Dette er et familiemedlem uten eget Premium<br>
        • Kontoen har gratis-plan, ikke Premium<br>
        • Prøv å logge ut/inn for å oppdatere<br>
        ` : `<b>Premium OK!</b> Problemet er sannsynligvis token-scopes.<br>
        Logg ut og inn igjen etter at streaming-scope er lagt til.<br>`}
      `;
      result(summary);
      log("=== FERDIG ===", "warn");
    });
  </script>
</body>
</html>
